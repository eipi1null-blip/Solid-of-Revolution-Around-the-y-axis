<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cylindrical Approximation About the y-axis</title>
  <style>
    :root { --ink:#181b22; --panel:#e9eef7; --line:#8f949c; --purple:#6757d8; --red:#ef4054; --blue:#2a4d9f; --magenta:#aa285b; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; background:#f8f9fb; color:var(--ink); font-family:Arial, Helvetica, sans-serif; }
    main { width:min(1240px, calc(100vw - 18px)); margin:0 auto; padding:9px 0 22px; }
    .applet { display:grid; grid-template-columns:300px minmax(580px,1fr); min-height:660px; border:2px solid var(--line); background:#fff; overflow:hidden; }
    .controls { display:grid; align-content:start; gap:24px; padding:22px 24px; background:var(--panel); border-right:2px solid #d3d8e2; }
    .reset { justify-self:end; width:48px; aspect-ratio:1; border:0; background:transparent; color:#595f69; cursor:pointer; }
    .reset svg { width:42px; height:42px; fill:none; stroke:currentColor; stroke-width:2.4; }
    .toggles { display:grid; gap:18px; }
    label { display:flex; align-items:center; gap:14px; color:#30343c; font-size:1.42rem; font-weight:800; line-height:1.12; }
    input[type="checkbox"] { appearance:none; width:52px; aspect-ratio:1; flex:0 0 auto; margin:0; border:4px solid #858991; border-radius:5px; background:#fff; display:grid; place-items:center; cursor:pointer; }
    input[type="checkbox"]:checked { border-color:var(--purple); background:var(--purple); }
    input[type="checkbox"]:checked::after { content:""; width:28px; height:16px; border-left:6px solid #fff; border-bottom:6px solid #fff; transform:rotate(-45deg) translate(2px,-3px); }
    .slider-card { display:grid; gap:16px; margin-top:8px; padding-top:8px; }
    .slider-title { margin:0; color:#50545f; font:700 1.75rem/1.08 Georgia, "Times New Roman", serif; }
    .slider-row { display:grid; grid-template-columns:1fr 48px; align-items:center; gap:12px; }
    input[type="range"] { appearance:none; width:100%; height:40px; padding:15px 0; background:transparent; cursor:pointer; }
    input[type="range"]::-webkit-slider-runnable-track { height:8px; border-radius:999px; background:#e998ae; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:26px; height:26px; margin-top:-9px; border:3px solid #16171b; border-radius:50%; background:var(--red); box-shadow:0 0 0 8px rgba(239,64,84,.24); }
    input[type="range"]::-moz-range-track { height:8px; border-radius:999px; background:#e998ae; }
    input[type="range"]::-moz-range-thumb { width:20px; height:20px; border:3px solid #16171b; border-radius:50%; background:var(--red); box-shadow:0 0 0 8px rgba(239,64,84,.24); }
    .value { color:var(--red); font-size:1.65rem; font-weight:900; text-align:center; text-shadow:0 2px 0 #fff,0 -2px 0 #fff,2px 0 0 #fff,-2px 0 0 #fff; }
    .hint { margin:0; color:#59606c; font-size:.95rem; line-height:1.35; }
    .viewport { position:relative; min-height:660px; background:radial-gradient(circle at 62% 43%, #fff 0 23%, #eee 52%, #fff 80%); }
    canvas { display:block; width:100%; height:100%; min-height:660px; touch-action:none; cursor:grab; }
    canvas.dragging { cursor:grabbing; }
    @media (max-width:900px) { .applet{grid-template-columns:1fr;} .controls{border-right:0;border-bottom:2px solid #d3d8e2;gap:14px;} .viewport,canvas{min-height:520px;} }
  </style>
</head>
<body>
  <main>
    <section class="applet" aria-label="Cylindrical approximation about the y-axis">
      <aside class="controls">
        <button class="reset" id="reset" type="button" aria-label="Reset applet">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6v5h-5"></path><path d="M4.7 12.2a7.2 7.2 0 0 0 12.1 4.7L20 13.7"></path><path d="M4 18v-5h5"></path><path d="M19.3 11.8A7.2 7.2 0 0 0 7.2 7.1L4 10.3"></path></svg>
        </button>
        <div class="toggles">
          <label><input id="adjustCurve" type="checkbox">Adjust curve</label>
          <label><input id="showSolid" type="checkbox" checked>Show solid</label>
          <label><input id="showCylinders" type="checkbox" checked>Show cylinders</label>
        </div>
        <div class="slider-card">
          <p class="slider-title">Number of cylinders</p>
          <div class="slider-row"><input id="cylinderCount" type="range" min="1" max="20" step="1" value="4" aria-label="Number of cylinders"><span class="value" id="countValue">4</span></div>
          <p class="hint">This version rotates the curve around the y-axis. Drag the graph to inspect it.</p>
        </div>
      </aside>
      <div class="viewport"><canvas id="scene" aria-label="3D solid of revolution around the y-axis"></canvas></div>
    </section>
  </main>
  <script>
    const canvas=document.getElementById("scene"),ctx=canvas.getContext("2d");
    const adjustCurve=document.getElementById("adjustCurve"),showSolid=document.getElementById("showSolid"),showCylinders=document.getElementById("showCylinders"),cylinderCount=document.getElementById("cylinderCount"),countValue=document.getElementById("countValue"),resetButton=document.getElementById("reset");
    const yMax=4.8;
    const controls=[{y:.75,x:.72},{y:2.35,x:1.82},{y:3.75,x:1.08}],defaults=controls.map(p=>({...p}));
    let yaw=-.72,pitch=.30,scale=105,origin={x:0,y:0},active=null,last=null;
    const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
    const smooth=t=>t*t*(3-2*t);
    function rAt(y){const pts=[{y:0,x:.28},...controls,{y:yMax,x:.56}];for(let i=0;i<pts.length-1;i++){const a=pts[i],b=pts[i+1];if(y>=a.y&&y<=b.y){const t=smooth((y-a.y)/(b.y-a.y));return clamp(a.x+(b.x-a.x)*t+.04*Math.sin(3.4*y),.14,2.05)}}return .5}
    function resize(){const rect=canvas.getBoundingClientRect(),dpr=window.devicePixelRatio||1;canvas.width=Math.floor(rect.width*dpr);canvas.height=Math.floor(rect.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);scale=Math.min(rect.width/10.1,rect.height/8.7);origin={x:rect.width*.50,y:rect.height*.75};draw()}
    function project(p){const cy=Math.cos(yaw),sy=Math.sin(yaw),cp=Math.cos(pitch),sp=Math.sin(pitch);const x1=p.x*cy+p.z*sy,z1=-p.x*sy+p.z*cy,y1=p.y*cp-z1*sp,z2=p.y*sp+z1*cp,k=1/(1+z2*.12);return{x:origin.x+x1*scale*k,y:origin.y-y1*scale*k,z:z2,k}}
    function surf(y,t,r=rAt(y)){return{x:r*Math.cos(t),y,z:r*Math.sin(t)}}
    function poly(points,fill,stroke,width=1,dash=[],alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=fill;ctx.strokeStyle=stroke;ctx.lineWidth=width;ctx.setLineDash(dash);ctx.beginPath();points.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}
    function path3(points,color,width=2,dash=[],alpha=1){ctx.save();ctx.globalAlpha=alpha;ctx.strokeStyle=color;ctx.lineWidth=width;ctx.setLineDash(dash);ctx.beginPath();points.map(project).forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.restore()}
    function circleY(y,r){const pts=[];for(let i=0;i<=64;i++)pts.push(project(surf(y,i*Math.PI*2/64,r)));return pts}
    function arrow(a,b,color="#111",dash=false){const p=project(a),q=project(b),ang=Math.atan2(q.y-p.y,q.x-p.x);ctx.save();ctx.strokeStyle=color;ctx.fillStyle=color;ctx.lineWidth=3;ctx.setLineDash(dash?[9,9]:[]);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.stroke();ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(q.x,q.y);ctx.lineTo(q.x-18*Math.cos(ang-.36),q.y-18*Math.sin(ang-.36));ctx.lineTo(q.x-18*Math.cos(ang+.36),q.y-18*Math.sin(ang+.36));ctx.closePath();ctx.fill();ctx.restore()}
    function plane(){const c=[project({x:-1.7,y:-.05,z:-1.5}),project({x:2.2,y:-.05,z:-1.5}),project({x:2.2,y:5.05,z:1.3}),project({x:-1.7,y:5.05,z:1.3})];const g=ctx.createLinearGradient(0,0,canvas.clientWidth,canvas.clientHeight);g.addColorStop(0,"rgba(236,236,236,.55)");g.addColorStop(.58,"rgba(170,170,170,.48)");g.addColorStop(1,"rgba(255,255,255,.16)");poly(c,g,"rgba(0,0,0,0)",0)}
    function drawSolid(){if(!showSolid.checked)return;const rings=24,steps=48;for(let j=rings-1;j>=0;j--){const t0=j*Math.PI*2/rings,t1=(j+1)*Math.PI*2/rings,strip=[];for(let i=0;i<=steps;i++)strip.push(project(surf(i*yMax/steps,t0)));for(let i=steps;i>=0;i--)strip.push(project(surf(i*yMax/steps,t1)));poly(strip,j%2?"rgba(42,74,150,.17)":"rgba(170,35,87,.18)","rgba(38,48,70,.22)",.7)}for(let j=0;j<9;j++){const t=j*Math.PI*2/9,pts=[];for(let i=0;i<=70;i++)pts.push(surf(i*yMax/70,t));path3(pts,"rgba(30,40,60,.55)",1.3)}}
    function drawCylinders(){if(!showCylinders.checked)return;const n=+cylinderCount.value,dy=yMax/n;for(let i=n-1;i>=0;i--){const y0=i*dy,y1=y0+dy,r=rAt((y0+y1)/2),side=[];for(let k=0;k<=60;k++)side.push(project(surf(y0,k*Math.PI*2/60,r)));for(let k=60;k>=0;k--)side.push(project(surf(y1,k*Math.PI*2/60,r)));poly(side,i%2?"rgba(65,90,160,.20)":"rgba(185,42,92,.24)","rgba(140,30,72,.50)",1.2,[7,7]);poly(circleY(y1,r),"rgba(185,42,92,.12)","rgba(145,32,72,.82)",2)}}
    function curve(){const pts=[];for(let i=0;i<=90;i++){const y=i*yMax/90;pts.push({x:rAt(y),y,z:0})}path3(pts,"#294e9e",3.2);if(!adjustCurve.checked)return;controls.forEach(p=>{const q=project({x:p.x,y:p.y,z:0});ctx.save();ctx.beginPath();ctx.arc(q.x,q.y,17,0,Math.PI*2);ctx.fillStyle="rgba(239,64,84,.30)";ctx.fill();ctx.beginPath();ctx.arc(q.x,q.y,8,0,Math.PI*2);ctx.fillStyle="#ef4054";ctx.strokeStyle="#15161a";ctx.lineWidth=2.5;ctx.fill();ctx.stroke();ctx.restore()})}
    function labels(){ctx.save();ctx.font="700 25px Georgia, serif";ctx.fillStyle="#15161a";let x=project({x:2.25,y:0,z:0}),y=project({x:0,y:5.15,z:0}),z=project({x:0,y:0,z:1.55});ctx.fillText("x",x.x+5,x.y-4);ctx.fillText("y",y.x+5,y.y-5);ctx.fillText("z",z.x+5,z.y-5);ctx.restore()}
    function draw(){ctx.clearRect(0,0,canvas.clientWidth,canvas.clientHeight);plane();arrow({x:-1.55,y:0,z:0},{x:2.25,y:0,z:0});arrow({x:0,y:-.25,z:0},{x:0,y:5.1,z:0});arrow({x:0,y:0,z:-1.4},{x:0,y:0,z:1.45});arrow({x:0,y:0,z:0},{x:0,y:4.6,z:0},"#5b1739",true);drawSolid();drawCylinders();curve();labels()}
    function hit(cx,cy){if(!adjustCurve.checked)return-1;const r=canvas.getBoundingClientRect();let best=-1,d0=1e9;controls.forEach((p,i)=>{const q=project({x:p.x,y:p.y,z:0}),d=Math.hypot(q.x-(cx-r.left),q.y-(cy-r.top));if(d<44&&d<d0){best=i;d0=d}});return best}
    function xFromScreen(cx,index){const rect=canvas.getBoundingClientRect(),target=cx-rect.left;let best=controls[index].x,dist=1e9;for(let x=.15;x<=2.08;x+=.005){const q=project({x,y:controls[index].y,z:0}),d=Math.abs(q.x-target);if(d<dist){dist=d;best=x}}return best}
    canvas.addEventListener("pointerdown",e=>{canvas.setPointerCapture(e.pointerId);canvas.classList.add("dragging");const h=hit(e.clientX,e.clientY);active=h>=0?{type:"control",index:h}:{type:"view"};last={x:e.clientX,y:e.clientY}});
    canvas.addEventListener("pointermove",e=>{if(!active)return;if(active.type==="control")controls[active.index].x=xFromScreen(e.clientX,active.index);else{yaw+=(e.clientX-last.x)*.008;pitch=clamp(pitch+(e.clientY-last.y)*.006,-.85,.85)}last={x:e.clientX,y:e.clientY};draw()});
    function end(e){if(canvas.hasPointerCapture(e.pointerId))canvas.releasePointerCapture(e.pointerId);active=null;canvas.classList.remove("dragging")}
    canvas.addEventListener("pointerup",end);canvas.addEventListener("pointercancel",end);
    cylinderCount.addEventListener("input",()=>{countValue.textContent=cylinderCount.value;draw()});
    [adjustCurve,showSolid,showCylinders].forEach(el=>el.addEventListener("change",draw));
    resetButton.addEventListener("click",()=>{defaults.forEach((p,i)=>{controls[i].x=p.x;controls[i].y=p.y});yaw=-.72;pitch=.30;cylinderCount.value=4;countValue.textContent="4";adjustCurve.checked=false;showSolid.checked=true;showCylinders.checked=true;draw()});
    window.addEventListener("resize",resize);resize();
  </script>
</body>
</html>
